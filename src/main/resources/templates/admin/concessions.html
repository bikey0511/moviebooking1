<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{staff/fragments/staff-layout :: layout('Quản lý bắp nước', 'concessions', ~{::main-content}, ~{::page-scripts})}">
<head><title>Concessions</title></head>
<body>
<th:block th:fragment="main-content">
    <div class="container-fluid">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
            <div>
                <h1 class="fs-3 mb-1">Quản lý bắp &amp; nước</h1>
                <p class="mb-0 text-secondary">Danh sách đồ ăn / uống phục vụ tại rạp</p>
            </div>
            <a th:href="@{/staff/concessions/new}" class="btn btn-primary">
                <i class="ti ti-plus me-1"></i>Thêm mới
            </a>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="ti ti-check me-2"></i><span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Tên</th>
                            <th>Loại</th>
                            <th>Giá (VNĐ)</th>
                            <th>Trạng thái</th>
                            <th></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="item : ${items}">
                            <td th:text="${item.id}">1</td>
                            <td class="fw-medium" th:text="${item.name}">Bắp ngọt</td>
                            <td>
                                <span class="badge rounded-pill text-bg-info" th:if="${item.type?.name() == 'BAP'}">Bắp</span>
                                <span class="badge rounded-pill text-bg-primary" th:if="${item.type?.name() == 'NUOC'}">Nước</span>
                                <span class="badge rounded-pill text-bg-warning text-dark" th:if="${item.type?.name() == 'COMBO'}">Combo</span>
                            </td>
                            <td th:text="${#numbers.formatInteger(item.price, 0, 'COMMA')}">35.000</td>
                            <td>
                                <span class="badge rounded-pill text-bg-success" th:if="${item.active}">Bán</span>
                                <span class="badge rounded-pill text-bg-secondary" th:unless="${item.active}">Tắt</span>
                            </td>
                            <td>
                                <a th:href="@{/staff/concessions/edit/{id}(id=${item.id})}" class="btn btn-sm btn-primary">
                                    <i class="ti ti-edit"></i>
                                </a>
                                <a th:href="@{/staff/concessions/delete/{id}(id=${item.id})}"
                                   class="btn btn-sm btn-outline-danger"
                                   onclick="return confirm('Xóa mục này?');">
                                    <i class="ti ti-trash"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(items)}">
                            <td colspan="6" class="text-center text-secondary py-4">Chưa có mục nào</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</th:block>
<th:block th:fragment="page-scripts"></th:block>
</body>
</html>
