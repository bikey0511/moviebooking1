<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout (pageTitle, activeNav, mainContent, pageScripts)"
      lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - InApp Cinema Admin'">Admin</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/inapp/assets/images/logo.svg}">
    <script type="module" th:src="@{/inapp/assets/js/main.js}"></script>
    <link rel="stylesheet" th:href="@{/inapp/assets/css/main.css}">
    <link rel="stylesheet" th:href="@{/inapp/assets/css/admin-pages.css}">
</head>
<body>
<div id="overlay" class="overlay"></div>

<nav id="topbar" class="navbar bg-white border-bottom fixed-top topbar px-3">
    <button id="toggleBtn" type="button" class="d-none d-lg-inline-flex btn btn-light btn-icon btn-sm">
        <i class="ti ti-layout-sidebar-left-expand"></i>
    </button>
    <button id="mobileBtn" type="button" class="btn btn-light btn-icon btn-sm d-lg-none me-2">
        <i class="ti ti-layout-sidebar-left-expand"></i>
    </button>
    <div class="ms-auto d-flex align-items-center gap-3 flex-wrap justify-content-end">
        <span class="text-secondary small d-none d-sm-inline">
            Xin chào, <strong sec:authentication="name">Admin</strong>
        </span>
        <span class="text-secondary small">Bảng điều khiển quản trị</span>
    </div>
</nav>

<aside id="sidebar" class="sidebar">
    <div class="logo-area">
        <a th:href="@{/admin/dashboard}" class="d-inline-flex align-items-center text-decoration-none">
            <img th:src="@{/inapp/assets/images/logo.svg}" alt="" width="28" height="28" class="rounded">
            <span class="logo-text ms-2 fw-semibold text-dark small">InApp Cinema Admin</span>
        </a>
    </div>
    <ul class="nav flex-column">
        <li class="px-4 py-2"><small class="nav-text text-secondary fw-semibold">MENU</small></li>
        <li>
            <a class="nav-link" th:classappend="${activeNav == 'dashboard'} ? 'active'" th:href="@{/admin/dashboard}">
                <i class="ti ti-home"></i><span class="nav-text">Trang chủ</span>
            </a>
        </li>
        <li>
            <a class="nav-link" th:classappend="${activeNav == 'users'} ? 'active'" th:href="@{/admin/users}">
                <i class="ti ti-users"></i><span class="nav-text">Người dùng</span>
            </a>
        </li>
        <li class="px-4 pt-3 pb-2"><small class="nav-text text-secondary fw-semibold">VẬN HÀNH</small></li>
        <li>
            <a class="nav-link" th:href="@{/staff/dashboard}" target="_blank">
                <i class="ti ti-armchair"></i><span class="nav-text">Khu vực nhân viên</span>
                <i class="ti ti-external-link ms-auto small"></i>
            </a>
        </li>
        <li>
            <a class="nav-link" th:classappend="${activeNav == 'analytics'} ? 'active'" th:href="@{/admin/analytics}">
                <i class="ti ti-chart-line"></i><span class="nav-text">Thống kê chi tiết</span>
            </a>
        </li>
        <li class="px-4 pt-4 pb-2"><small class="nav-text text-secondary">TÀI KHOẢN</small></li>
        <li>
            <form th:action="@{/auth/logout}" method="post" class="w-100">
                <button type="submit" class="nav-link border-0 bg-transparent w-100 text-start d-flex align-items-center gap-2 py-2 px-4" style="cursor:pointer;">
                    <i class="ti ti-logout"></i><span class="nav-text">Đăng xuất</span>
                </button>
            </form>
        </li>
    </ul>
</aside>

<main id="content" class="content py-10">
    <th:block th:replace="${mainContent}"></th:block>
</main>

<th:block th:replace="${pageScripts}"></th:block>
</body>
</html>
