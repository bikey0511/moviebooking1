<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{staff/fragments/staff-layout :: layout('Thêm / sửa phim', 'movies', ~{::main-content}, ~{::page-scripts})}">
<head><title>Movie form</title></head>
<body>
<th:block th:fragment="main-content">
    <div class="container-fluid" style="max-width: 900px;">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
            <div>
                <h1 class="fs-3 mb-1" th:text="${movie.id == null ? 'Thêm phim mới' : 'Sửa thông tin phim'}">Form phim</h1>
                <p class="mb-0 text-secondary">Nhập thông tin và poster</p>
            </div>
            <a th:href="@{/staff/movies}" class="btn btn-outline-secondary">
                <i class="ti ti-arrow-left me-1"></i>Quay lại
            </a>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
                <form id="movieForm" th:action="${movie.id == null ? '/staff/movies' : '/staff/movies/' + movie.id}"
                      method="post"
                      th:object="${movie}"
                      enctype="multipart/form-data"
                      onsubmit="var b=this.querySelector('button[type=submit]'); if(b) b.disabled=true;">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Tên phim</label>
                            <input type="text" class="form-control" th:field="*{title}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Thời lượng (phút)</label>
                            <input type="number" class="form-control" th:field="*{duration}" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Mô tả</label>
                        <textarea class="form-control" th:field="*{description}" rows="4"></textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Ngày khởi chiếu</label>
                            <input type="date" class="form-control" th:field="*{releaseDate}" required
                                   th:attr="min=${minReleaseDate}">
                            <small class="text-secondary">Không được chọn ngày trước hôm nay.</small>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Trạng thái</label>
                            <select class="form-select" th:field="*{status}">
                                <option value="NOW_SHOWING">Đang chiếu</option>
                                <option value="COMING_SOON">Sắp chiếu</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Ảnh poster</label>
                        <input type="file" class="form-control" name="poster" accept="image/*">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Link Trailer YouTube</label>
                        <input type="url" class="form-control" th:field="*{trailerUrl}" 
                               placeholder="https://www.youtube.com/watch?v=..."
                               pattern="https://www\.youtube\.com/.*">
                        <small class="text-secondary">Dán link YouTube để hiển thị trailer (vd: https://www.youtube.com/watch?v=xxxxx)</small>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="ti ti-device-floppy me-1"></i>Lưu
                        </button>
                        <a th:href="@{/staff/movies}" class="btn btn-outline-secondary">Hủy</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</th:block>
<th:block th:fragment="page-scripts"></th:block>
</body>
</html>
