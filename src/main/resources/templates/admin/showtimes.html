<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{staff/fragments/staff-layout :: layout('Quản lý suất chiếu', 'showtimes', ~{::main-content}, ~{::page-scripts})}">
<head><title>Suất chiếu</title></head>
<body>
<th:block th:fragment="main-content">
    <div class="container-fluid">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
            <div>
                <h1 class="fs-3 mb-1">Lịch suất chiếu</h1>
                <p class="mb-0 text-secondary">Chọn một trong 7 ngày tới — cùng phòng không được trùng giờ chiếu</p>
            </div>
            <a th:href="@{/staff/showtimes/new(date=${selectedDate})}" class="btn btn-primary">
                <i class="ti ti-plus me-1"></i>Thêm suất cho ngày này
            </a>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="ti ti-check me-2"></i><span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="ti ti-alert-circle me-2"></i><span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="d-flex flex-wrap gap-2 mb-4">
            <a th:each="d : ${weekDays}"
               th:href="@{/staff/showtimes(date=${d})}"
               class="btn btn-lg"
               th:classappend="${d.equals(selectedDate)} ? 'btn-primary' : 'btn-outline-primary'">
                <span class="d-block small text-uppercase" th:text="${#temporals.format(d, 'EEE')}">T2</span>
                <span class="fw-semibold" th:text="${#temporals.format(d, 'dd/MM')}">01/01</span>
            </a>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body">
                <h2 class="h6 text-secondary mb-3">
                    Suất ngày <span th:text="${#temporals.format(selectedDate, 'dd/MM/yyyy')}">01/01/2026</span>
                </h2>
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>Giờ chiếu</th>
                            <th>Phim</th>
                            <th>Phòng</th>
                            <th>Giá vé</th>
                            <th></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="st : ${showtimes}">
                            <td class="fw-semibold" th:text="${#temporals.format(st.startTime, 'HH:mm')}">18:00</td>
                            <td th:text="${st.movie.title}">Tên phim</td>
                            <td th:text="${st.room.name}">Phòng 1</td>
                            <td><span th:text="${#numbers.formatDecimal(st.price, 1, 'COMMA', 0, 'POINT')}">80000</span> VNĐ</td>
                            <td>
                                <form th:action="@{/staff/showtimes/delete/{id}(id=${st.id})}" method="post" class="d-inline"
                                      onsubmit="return confirm('Xóa suất chiếu này?');">
                                    <input type="hidden" name="date" th:value="${selectedDate}"/>
                                    <button type="submit" class="btn btn-sm btn-outline-danger">
                                        <i class="ti ti-trash me-1"></i>Xóa
                                    </button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(showtimes)}">
                            <td colspan="5" class="text-center text-secondary py-4">Chưa có suất nào trong ngày này</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</th:block>
<th:block th:fragment="page-scripts"></th:block>
</body>
</html>
