<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{staff/fragments/staff-layout :: layout('Thêm / sửa bắp nước', 'concessions', ~{::main-content}, ~{::page-scripts})}">
<head><title>Concession form</title></head>
<body>
<th:block th:fragment="main-content">
    <div class="container-fluid" style="max-width: 600px;">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
            <div>
                <h1 class="fs-3 mb-1">
                    <i class="ti ti-cookie me-2"></i>
                    <span th:if="${item.id != null}">Sửa</span><span th:unless="${item.id != null}">Thêm</span> đồ ăn / uống
                </h1>
                <p class="mb-0 text-secondary">Nhập thông tin món</p>
            </div>
            <a th:href="@{/staff/concessions}" class="btn btn-outline-secondary">
                <i class="ti ti-arrow-left me-1"></i>Quay lại
            </a>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <form th:action="@{/staff/concessions/save}" th:object="${item}" method="post" enctype="multipart/form-data">
                    <input type="hidden" th:field="*{id}"/>
                    <div class="mb-3">
                        <label class="form-label">Tên món</label>
                        <input type="text" class="form-control" th:field="*{name}" placeholder="VD: Bắp ngọt size M" required/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Mô tả (tùy chọn)</label>
                        <input type="text" class="form-control" th:field="*{description}" placeholder="Mô tả ngắn"/>
                    </div>
                    <!-- Giữ imageUrl cũ để khi edit mà không chọn file mới thì vẫn hiển thị đúng ảnh -->
                    <input type="hidden" th:field="*{imageUrl}"/>
                    <div class="mb-3">
                        <label class="form-label">Chọn file ảnh</label>
                        <input type="file" class="form-control" name="imageFile" accept="image/*"/>
                        <small class="text-secondary d-block mt-1">
                            Nên chọn ảnh .jpg/.png. Nếu không chọn file mới thì sẽ giữ ảnh cũ.
                        </small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Loại</label>
                        <select class="form-select" th:field="*{type}" required>
                            <option value="BAP">Bắp</option>
                            <option value="NUOC">Nước</option>
                            <option value="COMBO">Combo</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Giá (VNĐ)</label>
                        <input type="number" class="form-control" th:field="*{price}" min="0" step="1000" required/>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" th:field="*{active}" id="active"/>
                        <label class="form-check-label" for="active">Đang bán</label>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="ti ti-device-floppy me-1"></i>Lưu
                        </button>
                        <a th:href="@{/staff/concessions}" class="btn btn-outline-secondary">Hủy</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</th:block>
<th:block th:fragment="page-scripts"></th:block>
</body>
</html>
