<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{staff/fragments/staff-layout :: layout('Quản lý phòng chiếu', 'rooms', ~{::main-content}, ~{::page-scripts})}">
<head><title>Rooms</title></head>
<body>
<th:block th:fragment="main-content">
    <div class="container-fluid">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
            <div>
                <h1 class="fs-3 mb-1">Quản lý phòng chiếu</h1>
                <p class="mb-0 text-secondary">Danh sách phòng và loại phòng</p>
            </div>
            <a th:href="@{/staff/rooms/new}" class="btn btn-primary">
                <i class="ti ti-plus me-1"></i>Thêm phòng mới
            </a>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Tên phòng</th>
                            <th>Loại</th>
                            <th>Số ghế</th>
                            <th>Ngày tạo</th>
                            <th></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="room : ${rooms}">
                            <td th:text="${room.id}">1</td>
                            <td class="fw-medium" th:text="${room.name}">Phòng 1</td>
                            <td>
                                <span class="badge rounded-pill text-bg-primary" th:if="${room.roomType?.name() == 'NORMAL'}">Thường (120 chỗ)</span>
                                <span class="badge rounded-pill text-bg-warning text-dark" th:if="${room.roomType?.name() == 'VIP'}">VIP (40 ghế nằm)</span>
                                <span class="badge rounded-pill text-bg-secondary" th:if="${room.roomType == null}">—</span>
                            </td>
                            <td th:text="${room.totalSeats}">80</td>
                            <td th:text="${#temporals.format(room.createdAt, 'dd/MM/yyyy HH:mm')}">01/01/2024</td>
                            <td>
                                <a th:href="@{/staff/rooms/edit/{id}(id=${room.id})}" class="btn btn-sm btn-primary">
                                    <i class="ti ti-edit me-1"></i>Sửa
                                </a>
                                <a th:href="@{/staff/rooms/delete/{id}(id=${room.id})}"
                                   class="btn btn-sm btn-outline-danger"
                                   onclick="return confirm('Bạn có chắc chắn muốn xóa phòng này?');">
                                    <i class="ti ti-trash me-1"></i>Xóa
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(rooms)}">
                            <td colspan="6" class="text-center text-secondary py-4">Chưa có phòng chiếu nào</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</th:block>
<th:block th:fragment="page-scripts"></th:block>
</body>
</html>
