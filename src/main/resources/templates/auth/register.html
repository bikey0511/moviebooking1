<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - CINEMA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
    <style>
        :root {
            --primary-color: #e50914;
            --citrine: hsl(45, 100%, 56%);
            --eerie-black: hsl(207, 19%, 11%);
            --gunmetal-1: hsl(229, 15%, 21%);
            --gunmetal-2: hsl(216, 22%, 18%);
            --gainsboro: hsl(0, 7%, 88%);
            --white: hsl(0, 100%, 100%);
            --ff-poppins: 'Poppins', sans-serif;
            --fw-500: 500;
            --fw-600: 600;
            --fw-700: 700;
            --transition-1: 0.15s ease;
            --transition-2: 0.25s ease-in;
            --transition-3: 0.35s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--ff-poppins);
            background: linear-gradient(135deg, var(--eerie-black) 0%, #0d0d0d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 193, 7, 0.08) 0%, transparent 50%);
            animation: float 8s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(-5deg); }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-card {
            background: var(--gunmetal-1);
            border-radius: 25px;
            padding: 50px 40px;
            max-width: 480px;
            width: 100%;
            position: relative;
            z-index: 1;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.8s ease forwards;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .auth-logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-size: 28px;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 20px;
            transition: var(--transition-1);
            text-decoration: none;
        }

        .auth-logo:hover {
            transform: scale(1.05);
        }

        .auth-logo ion-icon {
            font-size: 36px;
        }

        .auth-header h1 {
            color: var(--white);
            font-size: 26px;
            margin-bottom: 10px;
        }

        .auth-header p {
            color: var(--gainsboro);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: var(--gainsboro);
            font-size: 13px;
            font-weight: var(--fw-500);
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gainsboro);
            font-size: 18px;
            transition: var(--transition-1);
        }

        .form-control {
            width: 100%;
            padding: 16px 18px 16px 50px;
            background: var(--gunmetal-2);
            border: 2px solid transparent;
            border-radius: 12px;
            color: var(--white);
            font-size: 14px;
            transition: var(--transition-1);
        }

        .form-control:focus {
            border-color: var(--citrine);
            box-shadow: 0 0 0 4px rgba(255, 193, 7, 0.1);
        }

        .form-control:focus ~ .input-icon {
            color: var(--citrine);
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--primary-color) 0%, #b20710 100%);
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 15px;
            width: 100%;
            color: var(--white);
            cursor: pointer;
            transition: var(--transition-2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(229, 9, 20, 0.4);
        }

        .auth-footer {
            text-align: center;
            margin-top: 25px;
            color: var(--gainsboro);
            font-size: 14px;
        }

        .auth-footer a {
            color: var(--citrine);
            text-decoration: none;
            font-weight: var(--fw-600);
            transition: var(--transition-1);
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .alert-toast {
            border-radius: 12px;
            border: none;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            animation: fadeInUp 0.5s ease forwards;
            font-size: 14px;
        }

        .alert-toast.alert-danger {
            background: linear-gradient(135deg, rgba(220, 53, 69, 0.95), rgba(200, 35, 51, 0.95));
            color: var(--white);
        }

        .alert-toast.alert-success {
            background: linear-gradient(135deg, rgba(46, 204, 113, 0.95), rgba(34, 139, 34, 0.95));
            color: var(--white);
        }

        .alert-toast ion-icon {
            font-size: 20px;
        }

        .benefits {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 15px;
            margin-top: 25px;
        }

        .benefits h4 {
            color: var(--citrine);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .benefits ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .benefits li {
            color: var(--gainsboro);
            font-size: 13px;
            padding: 5px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .benefits li ion-icon {
            color: var(--citrine);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-header">
            <a href="/" class="auth-logo">
                <ion-icon name="film"></ion-icon>
                <span>CINEMA</span>
            </a>
            <h1>Tạo Tài Khoản Mới</h1>
            <p>Đăng ký để đặt vé xem phim dễ dàng</p>
        </div>

        <div th:if="${error}" class="alert-toast alert-danger" role="alert">
            <ion-icon name="alert-circle"></ion-icon>
            <span th:text="${error}"></span>
        </div>
        <div th:if="${success}" class="alert-toast alert-success" role="alert">
            <ion-icon name="checkmark-circle"></ion-icon>
            <span th:text="${success}"></span>
        </div>

        <form th:action="@{/auth/register}" method="post" th:object="${user}">
            <div class="form-group">
                <label for="username" class="form-label">Tên đăng nhập</label>
                <div class="input-wrapper">
                    <input type="text" class="form-control" id="username" name="username" 
                           placeholder="Chọn tên đăng nhập" required>
                    <ion-icon name="person-outline" class="input-icon"></ion-icon>
                </div>
            </div>

            <div class="form-group">
                <label for="email" class="form-label">Email</label>
                <div class="input-wrapper">
                    <input type="email" class="form-control" id="email" name="email" 
                           placeholder="Nhập địa chỉ email" required>
                    <ion-icon name="mail-outline" class="input-icon"></ion-icon>
                </div>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Mật khẩu</label>
                <div class="input-wrapper">
                    <input type="password" class="form-control" id="password" name="password" 
                           placeholder="Tạo mật khẩu" required>
                    <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
                </div>
            </div>

            <button type="submit" class="btn-submit">
                <ion-icon name="person-add-outline"></ion-icon>
                Đăng Ký
            </button>
        </form>

        <div class="auth-footer">
            Đã có tài khoản? <a th:href="@{/auth/login}">Đăng nhập ngay</a>
        </div>

        <div class="benefits">
            <h4>Lợi ích khi đăng ký</h4>
            <ul>
                <li>
                    <ion-icon name="checkmark-circle"></ion-icon>
                    Đặt vé nhanh chóng
                </li>
                <li>
                    <ion-icon name="checkmark-circle"></ion-icon>
                    Nhận ưu đãi độc quyền
                </li>
                <li>
                    <ion-icon name="checkmark-circle"></ion-icon>
                    Xem lịch sử đặt vé
                </li>
                <li>
                    <ion-icon name="checkmark-circle"></ion-icon>
                    Nhận thông báo phim mới
                </li>
            </ul>
        </div>
    </div>
</body>
</html>
