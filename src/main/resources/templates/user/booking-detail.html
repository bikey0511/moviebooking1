<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết đặt vé</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-color: #e50914; --dark-bg: #141414; --card-bg: #1f1f1f; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--dark-bg); color: #fff; }
        .navbar { background-color: rgba(0,0,0,0.9) !important; }
        .navbar-brand { color: var(--primary-color) !important; font-weight: bold; }
        .detail-card { background: var(--card-bg); border-radius: 16px; padding: 28px; max-width: 700px; margin: 30px auto; }
        .detail-row { padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .badge-cancelled { background-color: #e74c3c; }
        .badge-pending { background-color: #f5a623; }
        .badge-paid { background-color: #2ecc71; }
        .badge-confirmed { background-color: #3498db; }
        .movie-poster { width: 100px; height: 140px; object-fit: cover; border-radius: 10px; }
    </style>
</head>
<body>
    <nav th:replace="~{fragments/user-nav :: userNav}"></nav>
    <div class="container">
        <div class="detail-card">
            <div class="d-flex justify-content-between align-items-start mb-4">
                <h5 class="mb-0">Chi tiết đặt vé</h5>
                <span class="badge"
                      th:classappend="${booking.status.name() == 'PAID'} ? 'badge-paid' : (${booking.status.name() == 'PENDING'} ? 'badge-pending' : (${booking.status.name() == 'CONFIRMED'} ? 'badge-confirmed' : 'badge-cancelled'))"
                      th:text="${booking.status.name() == 'PAID'} ? 'Đã thanh toán' : (${booking.status.name() == 'PENDING'} ? 'Chờ thanh toán' : (${booking.status.name() == 'CONFIRMED'} ? 'Đã xác nhận' : 'Đã hủy'))">Trạng thái</span>
            </div>
            <div class="detail-row">
                <span class="text-white-50">Mã vé</span>
                <div class="fw-bold" th:text="${booking.ticketCode}">CINEMA-xxx</div>
            </div>
            <div class="detail-row d-flex gap-3 align-items-center">
                <img th:src="${booking.showtime.movie.posterUrl != null} ? ${booking.showtime.movie.posterUrl} : '/images/no-poster.jpg'" class="movie-poster" alt="Poster" onerror="this.src='https://placehold.co/100x140/333/666?text=Poster'"/>
                <div>
                    <div class="detail-row"><span class="text-white-50">Phim</span><div class="fw-bold" th:text="${booking.showtime.movie.title}">Tên phim</div></div>
                    <div class="detail-row"><span class="text-white-50">Suất chiếu</span><div th:text="${#temporals.format(booking.showtime.startTime, 'dd/MM/yyyy HH:mm')}">01/01/2024 18:00</div></div>
                    <div class="detail-row"><span class="text-white-50">Phòng</span><div th:text="${booking.showtime.room.name}">Phòng 1</div></div>
                </div>
            </div>
            <div class="detail-row">
                <span class="text-white-50">Ghế</span>
                <div>
                    <span th:each="seat : ${booking.bookingSeats}" class="badge bg-secondary me-1" th:text="${seat.seat.rowName + seat.seat.seatNumber}">A1</span>
                </div>
            </div>
            <div class="detail-row">
                <span class="text-white-50">Tiền vé</span>
                <div><span th:text="${#numbers.formatDecimal(booking.totalPrice != null ? booking.totalPrice : 0, 1, 'COMMA', 0, 'POINT')}">0</span> VNĐ</div>
            </div>
            <div class="detail-row" th:if="${booking.concessionTotal != null and booking.concessionTotal.compareTo(0) > 0}">
                <span class="text-white-50">Bắp nước</span>
                <div><span th:text="${#numbers.formatDecimal(booking.concessionTotal, 1, 'COMMA', 0, 'POINT')}">0</span> VNĐ</div>
            </div>
            <div class="detail-row">
                <span class="text-white-50">Ngày đặt</span>
                <div th:text="${#temporals.format(booking.bookingTime, 'dd/MM/yyyy HH:mm')}">01/01/2024 10:00</div>
            </div>
            <div class="mt-4">
                <a th:href="@{/user/bookings}" class="btn btn-outline-light" style="border-radius: 10px; padding: 10px 22px;"><i class="fas fa-arrow-left me-1"></i>Quay về</a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
